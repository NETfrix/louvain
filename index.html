<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louvain Algorithm — Interactive Explanation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e0e0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{padding:12px 24px;background:#161822;border-bottom:1px solid #2a2d3a;display:flex;align-items:center;gap:16px;flex-shrink:0}
header h1{font-size:1.1rem;font-weight:600;color:#7eb8f7}
header .step-label{font-size:.85rem;color:#999;margin-left:auto}
.main{display:flex;flex:1;overflow:hidden}
.graph-panel{flex:1;position:relative;min-width:0}
svg{width:100%;height:100%;display:block}
.side-panel{width:420px;flex-shrink:0;background:#161822;border-left:1px solid #2a2d3a;display:flex;flex-direction:column;overflow:hidden}
.side-panel h2{padding:16px 20px 8px;font-size:.95rem;color:#7eb8f7;font-weight:600}
.explanation{padding:8px 20px 16px;font-size:.85rem;line-height:1.6;overflow-y:auto;flex:1}
.explanation p{margin-bottom:10px}
.formula-box{background:#1c1f2e;border:1px solid #2a2d3a;border-radius:8px;padding:14px 16px;margin:10px 0;font-family:'Courier New',monospace;font-size:.82rem;line-height:1.7;color:#c8d6e5}
.formula-box .highlight{color:#f7c948;font-weight:600}
.formula-box .result{color:#4ade80;font-weight:700}
.formula-box .label{color:#7eb8f7}
.formula-box .sep{color:#555;display:block;border-top:1px solid #333;margin:6px 0}
.community-list{list-style:none;padding:0;margin:8px 0}
.community-list li{padding:4px 8px;margin:2px 0;border-radius:4px;font-size:.82rem;display:flex;align-items:center;gap:8px}
.community-list li .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.timeline{flex-shrink:0;background:#161822;border-top:1px solid #2a2d3a;padding:12px 24px 16px}
.timeline-label{font-size:.72rem;color:#666;margin-bottom:6px;display:flex;justify-content:space-between}
.timeline-track{position:relative;height:32px;display:flex;align-items:center;gap:0}
.tl-step{flex:1;height:6px;background:#252836;cursor:pointer;position:relative;transition:background .2s}
.tl-step:first-child{border-radius:3px 0 0 3px}
.tl-step:last-child{border-radius:0 3px 3px 0}
.tl-step.active{background:#7eb8f7}
.tl-step.done{background:#3b5998}
.tl-step:hover{background:#4a5580}
.tl-step .tl-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:#252836;border:2px solid #3b5998;display:none}
.tl-step.milestone .tl-dot{display:block}
.tl-step.active .tl-dot{background:#7eb8f7;border-color:#7eb8f7}
.tl-step.done .tl-dot{background:#3b5998;border-color:#3b5998}
.tl-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#252836;color:#ccc;font-size:.7rem;padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s}
.tl-step:hover .tl-tooltip{opacity:1}
.nav-btns{display:flex;gap:8px;margin-top:8px;justify-content:center}
.nav-btns button{padding:6px 18px;border:1px solid #3b5998;background:transparent;color:#7eb8f7;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .15s}
.nav-btns button:hover{background:#3b5998;color:#fff}
.nav-btns button:disabled{opacity:.3;cursor:default;background:transparent}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:.7rem;font-weight:600;margin-left:6px}
.badge-phase1{background:#2d4a1e;color:#6ee76e}
.badge-phase2{background:#4a3a1e;color:#f7c948}
.badge-intro{background:#1e3a4a;color:#7eb8f7}
.badge-result{background:#3a1e4a;color:#c084fc}
.node-label{font-size:11px;fill:#fff;text-anchor:middle;pointer-events:none;font-weight:600}
.edge{stroke:#334;stroke-width:1.5}
.edge.bridge{stroke:#553a1e;stroke-dasharray:4,3}
.edge.highlight-edge{stroke:#f7c948;stroke-width:3;stroke-dasharray:none}
.graph-info{position:absolute;top:12px;left:12px;font-size:.75rem;color:#556;line-height:1.5}
.graph-info span{color:#7eb8f7}
.modularity-display{position:absolute;top:12px;right:12px;background:#1c1f2ecc;padding:8px 14px;border-radius:8px;font-size:.85rem;border:1px solid #2a2d3a}
.modularity-display .q-val{color:#4ade80;font-weight:700;font-size:1.1rem}

/* ── Chat Panel ────────────────────────────────── */
.chat-toggle{background:none;border:1px solid #3b5998;color:#7eb8f7;border-radius:6px;padding:5px 14px;font-size:.8rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.chat-toggle:hover{background:#3b5998;color:#fff}
.chat-toggle.active{background:#3b5998;color:#fff}
.chat-panel{display:none;flex-direction:column;border-top:1px solid #2a2d3a;background:#12141e;flex-shrink:0;height:340px;min-height:200px}
.chat-panel.open{display:flex}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#1a1d2e;border-bottom:1px solid #2a2d3a;flex-shrink:0}
.chat-header span{font-size:.8rem;color:#7eb8f7;font-weight:600}
.chat-header button{background:none;border:none;color:#666;cursor:pointer;font-size:1rem;padding:2px 6px}
.chat-header button:hover{color:#e0e0e0}
.chat-messages{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:8px 12px;border-radius:10px;font-size:.82rem;line-height:1.5;max-width:92%;word-wrap:break-word}
.chat-msg.user{background:#2a3a5c;color:#c8d6e5;align-self:flex-end;border-bottom-right-radius:3px}
.chat-msg.assistant{background:#1c1f2e;color:#d0d0d0;align-self:flex-start;border-bottom-left-radius:3px;border:1px solid #2a2d3a}
.chat-msg.assistant p{margin:0 0 6px}
.chat-msg.assistant p:last-child{margin:0}
.chat-msg.assistant code{background:#252836;padding:1px 5px;border-radius:3px;font-size:.78rem}
.chat-msg.assistant strong{color:#7eb8f7}
.chat-msg.system{background:transparent;color:#555;font-size:.75rem;align-self:center;text-align:center;padding:4px}
.chat-msg.error{background:#2a1a1a;color:#e74c3c;border:1px solid #3a1a1a}
.chat-msg .typing{display:inline-block;width:6px;height:6px;background:#7eb8f7;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.chat-input-row{display:flex;gap:6px;padding:8px 12px;border-top:1px solid #2a2d3a;flex-shrink:0;background:#161822}
.chat-input-row input{flex:1;background:#1c1f2e;border:1px solid #2a2d3a;border-radius:8px;padding:8px 12px;color:#e0e0e0;font-size:.82rem;outline:none}
.chat-input-row input:focus{border-color:#3b5998}
.chat-input-row button{background:#3b5998;border:none;color:#fff;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:.82rem;white-space:nowrap}
.chat-input-row button:hover{background:#4a6ab5}
.chat-input-row button:disabled{opacity:.4;cursor:default}
.api-key-bar{padding:10px 14px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:4px;padding:6px 14px;flex-shrink:0;border-top:1px solid #1a1d2e}
.chat-suggestions button{background:#1c1f2e;border:1px solid #2a2d3a;color:#888;border-radius:12px;padding:3px 10px;font-size:.72rem;cursor:pointer;transition:all .15s}
.chat-suggestions button:hover{border-color:#3b5998;color:#7eb8f7}
.resize-handle{height:4px;cursor:ns-resize;background:transparent;flex-shrink:0}
.resize-handle:hover{background:#3b5998}
</style>
</head>
<body>
<header>
  <h1>Louvain Community Detection</h1>
  <span class="step-label" id="stepLabel">Step 0 / 0</span>
  <button class="chat-toggle" id="chatToggle" onclick="toggleChat()">&#x1F4AC; Ask AI</button>
</header>
<div class="main">
  <div class="graph-panel" id="graphPanel">
    <svg id="graphSvg"></svg>
    <div class="graph-info" id="graphInfo"></div>
    <div class="modularity-display" id="modDisplay">Q = <span class="q-val" id="qVal">0.0000</span></div>
  </div>
  <div class="side-panel">
    <h2 id="sideTitle">Introduction</h2>
    <div class="explanation" id="explanation"></div>
    <div class="chat-panel" id="chatPanel">
      <div class="resize-handle" id="chatResize"></div>
      <div class="chat-header">
        <span>Ask about the algorithm</span>
        <button onclick="toggleChat()" title="Close">&times;</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg system">Ask anything about the current step, why the algorithm made a specific choice, or how the math works.</div>
      </div>
      <div class="chat-suggestions" id="chatSuggestions"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="e.g. Why did node 0 join this community?" onkeydown="if(event.key==='Enter')sendChat()" />
        <button id="chatSend" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>
<div class="timeline">
  <div class="timeline-label"><span>Timeline</span><span id="phaseLabel">Introduction</span></div>
  <div class="timeline-track" id="timeline"></div>
  <div class="nav-btns">
    <button id="btnFirst" onclick="goStep(0)">&#x23EE; First</button>
    <button id="btnPrev" onclick="goStep(currentStep-1)">&#x25C0; Prev</button>
    <button id="btnNext" onclick="goStep(currentStep+1)">Next &#x25B6;</button>
    <button id="btnLast" onclick="goStep(steps.length-1)">Last &#x23ED;</button>
  </div>
</div>

<script>
// ── GRAPH DEFINITION ─────────────────────────────────────────
const EDGES = [
  // Clique A: K4 on {0,1,2,3}
  [0,1],[0,2],[0,3],[1,2],[1,3],[2,3],
  // Clique B: K4 on {5,6,7,8}
  [5,6],[5,7],[5,8],[6,7],[6,8],[7,8],
  // Bridge through node 4
  [3,4],[4,5]
];
const N = 9;
const m = EDGES.length; // 14

const COLORS = [
  '#e74c3c','#3498db','#2ecc71','#f39c12',
  '#9b59b6','#1abc9c','#e67e22','#e84393',
  '#00b894','#6c5ce7','#fd79a8','#00cec9',
  '#ffeaa7','#dfe6e9','#74b9ff','#a29bfe'
];

function degree(node) {
  let d = 0;
  for (const [a, b] of EDGES) if (a === node || b === node) d++;
  return d;
}

function edgesBetween(nodeSet1, nodeSet2) {
  let count = 0;
  for (const [a, b] of EDGES) {
    if ((nodeSet1.has(a) && nodeSet2.has(b)) || (nodeSet1.has(b) && nodeSet2.has(a))) count++;
  }
  return count;
}

// ── MODULARITY COMPUTATION ──────────────────────────────────
function modularity(communities) {
  // communities: array of Sets
  let Q = 0;
  for (const C of communities) {
    let lc = 0; // internal edges
    for (const [a, b] of EDGES) {
      if (C.has(a) && C.has(b)) lc++;
    }
    let dc = 0; // sum of degrees
    for (const n of C) dc += degree(n);
    Q += lc / m - (dc / (2 * m)) ** 2;
  }
  return Q;
}

function communityOf(node, assignment) {
  return assignment[node];
}

function getCommunities(assignment) {
  const map = {};
  for (let i = 0; i < assignment.length; i++) {
    if (!map[assignment[i]]) map[assignment[i]] = new Set();
    map[assignment[i]].add(i);
  }
  return Object.values(map);
}

// ── DELTA-Q CALCULATION ─────────────────────────────────────
function deltaQ(node, targetComm, assignment) {
  const comNodes = new Set();
  for (let i = 0; i < assignment.length; i++) {
    if (assignment[i] === targetComm && i !== node) comNodes.add(i);
  }
  // k_{i,in}: edges from node to community
  let k_in = 0;
  for (const [a, b] of EDGES) {
    if (a === node && comNodes.has(b)) k_in++;
    if (b === node && comNodes.has(a)) k_in++;
  }
  // Σ_tot: sum of degrees of nodes in community
  let sigma_tot = 0;
  for (const n of comNodes) sigma_tot += degree(n);
  const k_i = degree(node);
  return k_in / m - (sigma_tot * k_i) / (2 * m * m);
}

// ── BUILD STEPS ─────────────────────────────────────────────
const steps = [];

function addStep(type, title, badge, assignment, html, extras = {}) {
  const comms = getCommunities(assignment);
  steps.push({
    type, title, badge,
    assignment: [...assignment],
    communities: comms,
    Q: modularity(comms),
    html,
    highlightNode: extras.highlightNode ?? -1,
    highlightEdges: extras.highlightEdges ?? [],
    highlightComm: extras.highlightComm ?? -1,
    superGraph: extras.superGraph ?? null,
  });
}

function buildSteps() {
  let assign = Array.from({length: N}, (_, i) => i);

  // Step 0: Introduction
  addStep('intro', 'What is the Louvain Algorithm?', 'intro', assign, `
    <p>The <b>Louvain algorithm</b> is a greedy method for <b>community detection</b> in large networks. It optimizes <b>modularity</b> — a measure of how well a network is partitioned into densely connected groups.</p>
    <p>Our network has <b>${N} nodes</b> and <b>${m} edges</b>: two cliques of 4 nodes (K<sub>4</sub>) joined by a bridge node (dashed lines).</p>
    <p>The algorithm works in two alternating phases:</p>
    <p><b>Phase 1</b> — Local moves: try moving each node to a neighbor's community if it increases modularity.</p>
    <p><b>Phase 2</b> — Aggregation: collapse each community into a single super-node and repeat.</p>
    <p>Initially, every node is its own community (${N} communities). Let's begin!</p>
  `);

  // Step 1: The formula
  addStep('intro', 'The Modularity Formula', 'intro', assign, `
    <p>Modularity <b>Q</b> measures partition quality:</p>
    <div class="formula-box">
      <span class="label">Q</span> = Σ<sub>c</sub> [ <span class="highlight">L<sub>c</sub>/m</span> − (<span class="highlight">d<sub>c</sub>/2m</span>)² ]
      <span class="sep"></span>
      <span class="label">L<sub>c</sub></span> = edges inside community c<br>
      <span class="label">d<sub>c</sub></span> = sum of degrees in community c<br>
      <span class="label">m</span> = total edges = ${m}
    </div>
    <p>To decide if node <b>i</b> should move to community <b>C</b>, we compute the <b>modularity gain</b>:</p>
    <div class="formula-box">
      <span class="label">ΔQ</span> = <span class="highlight">k<sub>i,in</sub></span>/m − (<span class="highlight">Σ<sub>tot</sub></span> · <span class="highlight">k<sub>i</sub></span>) / 2m²
      <span class="sep"></span>
      <span class="label">k<sub>i,in</sub></span> = edges from i to community C<br>
      <span class="label">Σ<sub>tot</sub></span> = sum of degrees in C (excl. i)<br>
      <span class="label">k<sub>i</sub></span> = degree of node i
    </div>
    <p>We move node <b>i</b> to the community giving the <b>largest positive ΔQ</b>.</p>
  `);

  // Step 2: Show initial modularity
  const Q0 = modularity(getCommunities(assign));
  addStep('intro', 'Initial State', 'intro', assign, `
    <p>Each of the ${N} nodes starts in its own community. The initial modularity is:</p>
    <div class="formula-box">
      Q = Σ [ 0/${m} − (k<sub>i</sub>/${2*m})² ] = <span class="result">${Q0.toFixed(4)}</span>
    </div>
    <p>Since no community has internal edges (L<sub>c</sub>=0 for all), Q is negative — we can only go up from here.</p>
    <p>Now Phase 1 begins. We scan each node and try moving it to its best neighbor's community.</p>
  `);

  // ── PHASE 1 ────────────────────────────────────────────────
  // Run Louvain Phase 1, recording key steps
  let moveCount = 0;
  let improved = true;
  let passNum = 0;

  while (improved) {
    improved = false;
    passNum++;
    const showThisPass = passNum <= 2; // show detail for first 2 passes

    for (let node = 0; node < N; node++) {
      const currentComm = assign[node];
      // Find neighbor communities
      const neighborComms = new Set();
      const neighborMap = {};
      for (const [a, b] of EDGES) {
        const nbr = a === node ? b : (b === node ? a : -1);
        if (nbr >= 0) {
          neighborComms.add(assign[nbr]);
          if (!neighborMap[assign[nbr]]) neighborMap[assign[nbr]] = [];
          neighborMap[assign[nbr]].push(nbr);
        }
      }

      let bestComm = currentComm;
      let bestDQ = 0;
      const dqResults = {};

      // ΔQ for removing from current community (always compute)
      const dqRemove = -deltaQ(node, currentComm, assign);

      for (const comm of neighborComms) {
        if (comm === currentComm) continue;
        const dq = deltaQ(node, comm, assign) + dqRemove;
        dqResults[comm] = dq;
        if (dq > bestDQ) { bestDQ = dq; bestComm = comm; }
      }

      if (bestComm !== currentComm && bestDQ > 1e-10) {
        // Show this move
        moveCount++;
        const k_i = degree(node);
        // Compute displayed values for best community
        const comNodes = new Set();
        for (let i = 0; i < assign.length; i++) {
          if (assign[i] === bestComm && i !== node) comNodes.add(i);
        }
        let k_in = 0;
        const hEdges = [];
        for (const [a, b] of EDGES) {
          if (a === node && comNodes.has(b)) { k_in++; hEdges.push([a,b]); }
          if (b === node && comNodes.has(a)) { k_in++; hEdges.push([a,b]); }
        }
        let sigma_tot = 0;
        for (const n of comNodes) sigma_tot += degree(n);

        const showDetail = showThisPass && moveCount <= 10;

        if (showDetail) {
          const commMembers = [...comNodes].sort((a,b)=>a-b);
          // Build neighbor community descriptions
          const nbrCommDescs = [...neighborComms].map(c => {
            const members = [];
            for (let j = 0; j < N; j++) if (assign[j] === c) members.push(j);
            return '{' + members.sort((a,b)=>a-b).join(',') + '}';
          });
          const currentMembers = [];
          for (let j = 0; j < N; j++) if (assign[j] === currentComm) currentMembers.push(j);
          const currentDesc = '{' + currentMembers.sort((a,b)=>a-b).join(',') + '}';
          addStep('phase1', `Move node ${node} → community {${commMembers.join(',')}}`, 'phase1', assign, `
            <p><b>Phase 1, Pass ${passNum}</b> — Evaluating node <b>${node}</b> (degree k<sub>${node}</sub> = ${k_i}).</p>
            <p>Node ${node} is currently in community ${currentDesc}. Its neighbors belong to: ${nbrCommDescs.join(', ')}.</p>
            <p>Best option: move to community <b>{${commMembers.join(',')}}</b>:</p>
            <div class="formula-box">
              <span class="label">k<sub>${node},in</sub></span> = ${k_in} (edge${k_in!==1?'s':''} to {${commMembers.join(',')}})<br>
              <span class="label">Σ<sub>tot</sub></span> = ${sigma_tot} (sum of degrees in target)<br>
              <span class="label">k<sub>${node}</sub></span> = ${k_i}<br>
              <span class="label">m</span> = ${m}
              <span class="sep"></span>
              <span class="label">ΔQ</span> = ${k_in}/${m} − (${sigma_tot} × ${k_i}) / (2 × ${m}²)<br>
              &nbsp;&nbsp;&nbsp;&nbsp;= ${(k_in/m).toFixed(4)} − ${(sigma_tot*k_i/(2*m*m)).toFixed(4)}<br>
              &nbsp;&nbsp;&nbsp;&nbsp;= <span class="result">${bestDQ.toFixed(4)}</span> &gt; 0 ✓ Move!
            </div>
          `, { highlightNode: node, highlightEdges: hEdges, highlightComm: bestComm });
        }

        assign[node] = bestComm;
        improved = true;

        if (showDetail) {
          const commsNow = getCommunities(assign);
          const Qnow = modularity(commsNow);
          addStep('phase1', `After moving node ${node}`, 'phase1', assign, `
            <p>Node <b>${node}</b> has been moved. The network now has <b>${commsNow.length} communities</b>.</p>
            <div class="formula-box">
              Q = <span class="result">${Qnow.toFixed(4)}</span> (was ${(Qnow - bestDQ).toFixed(4)}, gained ${bestDQ.toFixed(4)})
            </div>
            <p>Current communities:</p>
            <ul class="community-list">${commsNow.map((c, i) => {
              const members = [...c].sort((a,b)=>a-b);
              return `<li><span class="dot" style="background:${COLORS[assign[members[0]] % COLORS.length]}"></span>{${members.join(', ')}}</li>`;
            }).join('')}</ul>
          `);
        }
      }
    }

    // After each pass, show summary
    const commsAfterPass = getCommunities(assign);
    const QafterPass = modularity(commsAfterPass);
    if (passNum <= 3) {
      addStep('phase1', `Phase 1, Pass ${passNum} Complete`, 'phase1', assign, `
        <p>Pass ${passNum} of Phase 1 is complete. ${improved ? 'Some nodes moved — we\'ll do another pass.' : 'No nodes moved — Phase 1 converges!'}</p>
        <div class="formula-box">
          Q = <span class="result">${QafterPass.toFixed(4)}</span><br>
          Communities: <span class="highlight">${commsAfterPass.length}</span>
        </div>
        <p>Communities found:</p>
        <ul class="community-list">${commsAfterPass.map((c) => {
          const members = [...c].sort((a,b)=>a-b);
          return `<li><span class="dot" style="background:${COLORS[assign[members[0]] % COLORS.length]}"></span>{${members.join(', ')}}</li>`;
        }).join('')}</ul>
        ${!improved ? '<p>Phase 1 has <b>converged</b>. No node can improve modularity by switching. Now we move to <b>Phase 2</b>.</p>' : ''}
      `);
    }
  }

  // ── PHASE 2 ────────────────────────────────────────────────
  const phase1Comms = getCommunities(assign);
  const Qphase1 = modularity(phase1Comms);

  // Build super-graph
  const commIds = {};
  const commList = [];
  phase1Comms.forEach((c, i) => {
    commList.push(c);
    for (const n of c) commIds[n] = i;
  });

  const superEdges = [];
  const superWeights = {};
  const selfLoops = {};
  for (const [a, b] of EDGES) {
    const ca = commIds[a], cb = commIds[b];
    if (ca === cb) {
      selfLoops[ca] = (selfLoops[ca] || 0) + 1;
    } else {
      const key = Math.min(ca, cb) + '-' + Math.max(ca, cb);
      if (!superWeights[key]) {
        superWeights[key] = 0;
        superEdges.push([Math.min(ca, cb), Math.max(ca, cb)]);
      }
      superWeights[key]++;
    }
  }

  addStep('phase2', 'Phase 2: Build Super-Graph', 'phase2', assign, `
    <p>In Phase 2, each community from Phase 1 becomes a <b>super-node</b>. Edges between communities become weighted edges between super-nodes. Internal edges become self-loops.</p>
    <div class="formula-box">
      <span class="label">Super-nodes:</span> ${commList.length}<br>
      ${commList.map((c, i) => {
        const members = [...c].sort((a,b)=>a-b);
        return `S<sub>${i}</sub> = {${members.join(',')}} (self-loops: ${selfLoops[i]||0})`;
      }).join('<br>')}
      <span class="sep"></span>
      <span class="label">Super-edges:</span><br>
      ${superEdges.map(([a,b]) => {
        const key = Math.min(a,b)+'-'+Math.max(a,b);
        return `S<sub>${a}</sub> — S<sub>${b}</sub> (weight ${superWeights[key]})`;
      }).join('<br>')}
    </div>
    <p>Modularity is preserved: Q = <span style="color:#4ade80;font-weight:700">${Qphase1.toFixed(4)}</span>.</p>
    <p>We would now run Phase 1 again on this super-graph. The bridge edges between super-nodes are too weak relative to internal self-loops, so no super-node benefits from merging — <b>the algorithm converges</b>.</p>
  `, { superGraph: { nodes: commList, edges: superEdges, weights: superWeights, selfLoops } });

  // ── FINAL RESULT ───────────────────────────────────────────
  addStep('result', 'Final Result', 'result', assign, `
    <p>The Louvain algorithm has converged! It found <b>${phase1Comms.length} communities</b>:</p>
    <ul class="community-list">${phase1Comms.map((c, i) => {
      const members = [...c].sort((a,b)=>a-b);
      const lc = EDGES.filter(([a,b]) => c.has(a) && c.has(b)).length;
      const dc = members.reduce((s, n) => s + degree(n), 0);
      return `<li><span class="dot" style="background:${COLORS[i]}"></span><b>{${members.join(', ')}}</b> — ${lc} internal edges, d<sub>c</sub>=${dc}</li>`;
    }).join('')}</ul>
    <div class="formula-box">
      <span class="label">Final Modularity:</span><br><br>
      Q = Σ [ L<sub>c</sub>/${m} − (d<sub>c</sub>/${2*m})² ]<br><br>
      ${phase1Comms.map((c, i) => {
        const members = [...c].sort((a,b)=>a-b);
        const lc = EDGES.filter(([a,b]) => c.has(a) && c.has(b)).length;
        const dc = members.reduce((s, n) => s + degree(n), 0);
        return `&nbsp; C<sub>${i}</sub>: ${lc}/${m} − (${dc}/${2*m})² = ${(lc/m).toFixed(4)} − ${(dc/(2*m)).toFixed(4)}² = ${(lc/m - (dc/(2*m))**2).toFixed(4)}`;
      }).join('<br>')}
      <span class="sep"></span>
      <span class="result">Q = ${Qphase1.toFixed(4)}</span>
    </div>
    <p>The algorithm successfully recovered the natural communities from the network structure.</p>
    <p>Use the timeline below to revisit any step.</p>
  `);
}

function seededRandom() { _seed = (_seed * 16807 + 0) % 2147483647; return _seed / 2147483647; }

// Clique A left, bridge center, clique B right
const fixedPositions = [
  // Clique A {0,1,2,3}
  {x: W*0.18, y: H*0.30},
  {x: W*0.10, y: H*0.55},

  {x: W*0.90, y: H*0.55},
];

for (let i = 0; i < N; i++) {
  nodePositions.push({
    x: fixedPositions[i].x + (seededRandom() - 0.5) * 10,
    y: fixedPositions[i].y + (seededRandom() - 0.5) * 10,
    vx: 0, vy: 0
  });
}

// Run force simulation
function simulate(iterations) {
  for (let iter = 0; iter < iterations; iter++) {
    // Repulsion
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        let dx = nodePositions[i].x - nodePositions[j].x;
        let dy = nodePositions[i].y - nodePositions[j].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = 3000 / (dist * dist);
        let fx = dx / dist * force;
        let fy = dy / dist * force;
        nodePositions[i].vx += fx;
        nodePositions[i].vy += fy;
        nodePositions[j].vx -= fx;
        nodePositions[j].vy -= fy;
      }
    }
    // Attraction along edges
    for (const [a, b] of EDGES) {
      let dx = nodePositions[b].x - nodePositions[a].x;
      let dy = nodePositions[b].y - nodePositions[a].y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      let force = (dist - 80) * 0.05;
      let fx = dx / dist * force;
      let fy = dy / dist * force;
      nodePositions[a].vx += fx;
      nodePositions[a].vy += fy;
      nodePositions[b].vx -= fx;
      nodePositions[b].vy -= fy;
    }
    // Center gravity
    for (let i = 0; i < N; i++) {
      nodePositions[i].vx += (W / 2 - nodePositions[i].x) * 0.01;
      nodePositions[i].vy += (H / 2 - nodePositions[i].y) * 0.01;
    }
    // Apply velocity with damping
    const damping = 0.85;
    for (let i = 0; i < N; i++) {
      nodePositions[i].vx *= damping;
      nodePositions[i].vy *= damping;
      nodePositions[i].x += nodePositions[i].vx;
      nodePositions[i].y += nodePositions[i].vy;
      // Bounds
      nodePositions[i].x = Math.max(30, Math.min(W - 30, nodePositions[i].x));
      nodePositions[i].y = Math.max(30, Math.min(H - 30, nodePositions[i].y));
    }
  }
}

  const offsetY = (rect.height - H * scale) / 2;

  const g = document.createElementNS(ns, 'g');

  // Draw edges
  for (const [a, b] of EDGES) {

    line.setAttribute('class', cls);
    g.appendChild(line);
  }

  // Draw nodes
  for (let i = 0; i < N; i++) {
    const comm = s.assignment[i];
    // Find color index: use the smallest node in same community
    let colorIdx = comm;
    for (let j = 0; j < N; j++) {
      if (s.assignment[j] === comm) { colorIdx = j; break; }

    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', nodePositions[i].x);

    circle.setAttribute('stroke-width', i === s.highlightNode ? 3 : 2);
    g.appendChild(circle);

    const text = document.createElementNS(ns, 'text');
    text.setAttribute('x', nodePositions[i].x);
    text.setAttribute('y', nodePositions[i].y + 4);
    text.setAttribute('class', 'node-label');
    text.textContent = i;
    g.appendChild(text);
  }
}

// ── Context helpers ──────────────────────────────────────────
function neighbors(node) {
  const n = [];
  for (const [a, b] of EDGES) {
    if (a === node) n.push(b);
    if (b === node) n.push(a);
  }
  return n.sort((a,b)=>a-b);
}

function communityOfNode(node, assign) {
  const comm = [];
  const c = assign[node];
  for (let i = 0; i < assign.length; i++) if (assign[i] === c) comm.push(i);
  return comm.sort((a,b)=>a-b);
}

function internalEdges(members) {
  const s = new Set(members);
  let count = 0;
  for (const [a,b] of EDGES) if (s.has(a) && s.has(b)) count++;
  return count;
}

function sumDegrees(members) {
  return members.reduce((s, n) => s + degree(n), 0);
}

function computeDeltaQ(node, targetMembers, assign) {
  const s = new Set(targetMembers);
  s.delete(node);
  let k_in = 0;
  for (const [a,b] of EDGES) {
    if (a === node && s.has(b)) k_in++;
    if (b === node && s.has(a)) k_in++;
  }
  let sigma_tot = 0;
  for (const n of s) sigma_tot += degree(n);
  const k_i = degree(node);
  return { dq: k_in / m - (sigma_tot * k_i) / (2*m*m), k_in, sigma_tot, k_i };
}

// ── Extract numbers from question ────────────────────────────
function extractNodes(q) {
  const matches = q.match(/\bnode\s*(\d+)/gi) || [];
  return matches.map(m => parseInt(m.replace(/\D/g, ''))).filter(n => n >= 0 && n < N);
}

function extractAnyNumbers(q) {
  return [...q.matchAll(/\b(\d+)\b/g)].map(m => parseInt(m[1])).filter(n => n >= 0 && n < N);
}

// ── Answer generator ─────────────────────────────────────────
function answerQuestion(q) {
  const s = steps[currentStep];
  const assign = s.assignment;
  const ql = q.toLowerCase().trim();
  const nodes = extractNodes(ql);
  const anyNums = extractAnyNumbers(ql);

  // ── About a specific node ──
  if (nodes.length >= 1 || (anyNums.length >= 1 && (ql.includes('node') || ql.includes('degree') || ql.includes('neighbor') || ql.includes('communit')))) {
    const nd = nodes.length ? nodes[0] : anyNums[0];
    if (nd < 0 || nd >= N) return `Node ${nd} doesn't exist. This graph has nodes 0–15.`;

    const deg = degree(nd);
    const nbrs = neighbors(nd);
    const comm = communityOfNode(nd, assign);
    const commInternal = internalEdges(comm);
    const commDeg = sumDegrees(comm);

    // Why did node X move / join?
    if (ql.includes('why') || ql.includes('move') || ql.includes('join') || ql.includes('chose') || ql.includes('pick')) {
      const edgesToComm = nbrs.filter(n => assign[n] === assign[nd] && n !== nd);
      const edgesOutside = nbrs.filter(n => assign[n] !== assign[nd]);
      const { dq, k_in, sigma_tot, k_i } = computeDeltaQ(nd, comm, assign);

      let explanation = `<p><strong>Node ${nd}</strong> is in community {${comm.join(', ')}} with <strong>${edgesToComm.length}</strong> edge(s) to community members and <strong>${edgesOutside.length}</strong> edge(s) to nodes outside.</p>`;

      if (comm.length > 1) {
        explanation += `<p>The modularity gain for being in this community:<br>
          <code>ΔQ = k_in/m − (Σ_tot × k_i)/(2m²)</code><br>
          <code>&nbsp;&nbsp;&nbsp;= ${k_in}/${m} − (${sigma_tot} × ${k_i})/(2 × ${m}²)</code><br>
          <code>&nbsp;&nbsp;&nbsp;= ${(k_in/m).toFixed(4)} − ${(sigma_tot*k_i/(2*m*m)).toFixed(4)} = <strong>${dq.toFixed(4)}</strong></code></p>`;
        explanation += `<p>Node ${nd} has ${edgesToComm.length} internal connection(s) (to ${edgesToComm.join(', ')||'none'}) vs ${edgesOutside.length} external (to ${edgesOutside.join(', ')||'none'}), making this community the best fit — it maximizes internal density.</p>`;
      } else {
        explanation += `<p>Node ${nd} is currently alone. It hasn't been moved yet, or no neighbor community offers a positive ΔQ gain.</p>`;
      }
      return explanation;
    }

    // What if node X moved elsewhere?
    if (ql.includes('what if') || ql.includes('what would') || ql.includes('move to') || ql.includes('instead')) {
      const targetNode = nodes.length >= 2 ? nodes[1] : (anyNums.length >= 2 ? anyNums[1] : -1);
      let result = `<p><strong>Node ${nd}</strong> (degree ${deg}) is currently in {${comm.join(', ')}}. Let's compare alternatives:</p>`;

      // Compute ΔQ for each neighbor community
      const seen = new Set();
      const options = [];
      for (const nb of nbrs) {
        const nc = assign[nb];
        if (seen.has(nc) || nc === assign[nd]) continue;
        seen.add(nc);
        const targetMem = [];
        for (let i = 0; i < N; i++) if (assign[i] === nc) targetMem.push(i);
        const { dq, k_in, sigma_tot, k_i } = computeDeltaQ(nd, targetMem, assign);
        options.push({ members: targetMem, dq, k_in, sigma_tot });
      }
      options.sort((a, b) => b.dq - a.dq);

      for (const opt of options) {
        result += `<p>→ Move to {${opt.members.join(', ')}}: k_in=${opt.k_in}, Σ_tot=${opt.sigma_tot} → <strong>ΔQ = ${opt.dq.toFixed(4)}</strong> ${opt.dq > 0 ? '✓' : '✗'}</p>`;
      }
      if (options.length === 0) result += `<p>No alternative communities among neighbors.</p>`;
      return result;
    }

    // Default: node info
    return `<p><strong>Node ${nd}</strong></p>
      <p>Degree: <strong>${deg}</strong><br>
      Neighbors: {${nbrs.join(', ')}}<br>
      Current community: {${comm.join(', ')}}<br>
      Internal edges in community: ${commInternal}<br>
      Community total degree (d_c): ${commDeg}<br>
      Bridge node: <strong>${nd === 4 ? 'Yes — connects both cliques' : (nbrs.includes(4) ? 'Adjacent to bridge' : 'No')}</strong></p>`;
  }

  // ── Modularity formula ──
  if (ql.includes('formula') || ql.includes('modularity') && (ql.includes('what') || ql.includes('explain') || ql.includes('how') || ql.includes('mean'))) {
    const comms = s.communities;
    let breakdown = comms.map((c, i) => {
      const mem = [...c].sort((a,b)=>a-b);
      const lc = internalEdges(mem);
      const dc = sumDegrees(mem);
      const contrib = lc/m - (dc/(2*m))**2;
      return `C${i} {${mem.join(',')}}: L_c=${lc}, d_c=${dc} → ${lc}/${m} − (${dc}/${2*m})² = <strong>${contrib.toFixed(4)}</strong>`;
    }).join('<br>');

    return `<p><strong>Modularity Q</strong> measures how well the network is partitioned. Higher is better (max ~1, typically 0.3–0.7 is good).</p>
      <p><code>Q = Σ [ L_c/m − (d_c/2m)² ]</code></p>
      <p>First term <code>L_c/m</code>: fraction of edges inside community c. Rewards dense communities.<br>
      Second term <code>(d_c/2m)²</code>: expected fraction if edges were random. Penalizes large communities.</p>
      <p><strong>Current breakdown (Q = ${s.Q.toFixed(4)}):</strong><br>${breakdown}</p>`;
  }

  // ── Delta Q ──
  if (ql.includes('delta') || ql.includes('gain') || ql.includes('Δq') || ql.includes('dq')) {
    return `<p><strong>Modularity gain ΔQ</strong> measures how much Q improves when moving node i to community C:</p>
      <p><code>ΔQ = k_{i,in}/m − (Σ_tot × k_i)/(2m²)</code></p>
      <p><strong>k_{i,in}</strong>: edges from node i to nodes already in C (reward for connections)<br>
      <strong>Σ_tot</strong>: sum of degrees of nodes in C (penalty for community size)<br>
      <strong>k_i</strong>: degree of node i<br>
      <strong>m</strong>: total edges = ${m}</p>
      <p>The node moves to whichever community gives the <strong>largest positive ΔQ</strong>. If all ΔQ ≤ 0, the node stays put.</p>`;
  }

  // ── Phase 1 ──
  if (ql.includes('phase 1') || ql.includes('phase one') || ql.includes('local') && ql.includes('optim')) {
    return `<p><strong>Phase 1: Local Optimization</strong></p>
      <p>For each node, the algorithm:</p>
      <p>1. Computes ΔQ for moving to each <strong>neighbor's</strong> community<br>
      2. Picks the move with the <strong>largest positive ΔQ</strong><br>
      3. If ΔQ > 0, makes the move; otherwise the node stays</p>
      <p>This repeats in passes over all nodes until <strong>no node wants to move</strong> (convergence). In our graph, each K<sub>4</sub> clique has 6 internal edges vs only 1 bridge edge, so nodes strongly prefer their own clique.</p>`;
  }

  // ── Phase 2 ──
  if (ql.includes('phase 2') || ql.includes('phase two') || ql.includes('aggregat') || ql.includes('super')) {
    const comms = s.communities;
    return `<p><strong>Phase 2: Aggregation</strong></p>
      <p>Each community from Phase 1 becomes a <strong>super-node</strong>. Edges between different communities become weighted super-edges. Edges within a community become self-loops (preserving modularity).</p>
      <p>Currently there are <strong>${comms.length} communities</strong>, so the super-graph would have ${comms.length} nodes. Phase 1 then runs on this smaller graph.</p>
      <p>This hierarchical coarsening is what makes Louvain efficient on massive networks — each level shrinks the graph dramatically.</p>`;
  }

  // ── Bridge edges ──
  if (ql.includes('bridge') || ql.includes('dashed') || ql.includes('inter') && ql.includes('edge')) {
    return `<p><strong>Bridge edges</strong> (shown dashed) pass through the bridge node 4:</p>
      <p>• <strong>3 — 4</strong>: connects clique A {0,1,2,3} to bridge node 4<br>
      • <strong>4 — 5</strong>: connects bridge node 4 to clique B {5,6,7,8}</p>
      <p>Each clique has 6 internal edges (K<sub>4</sub>) but only 1 bridge edge, so the modularity gain from grouping nodes within their clique is much higher than pulling a node across the bridge. Node 4 (degree 2) joins whichever side offers better ΔQ.</p>`;
  }

  // ── Convergence ──
  if (ql.includes('converg') || ql.includes('stop') || ql.includes('terminat') || ql.includes('when does it end')) {
    return `<p><strong>Convergence</strong> happens when no single node can improve modularity by switching communities.</p>
      <p>Phase 1 converges when a full pass over all ${N} nodes produces <strong>zero moves</strong>. Then Phase 2 aggregates, and the cycle repeats until the super-graph Phase 1 also produces no moves.</p>
      <p>In our graph, Phase 1 groups the two K<sub>4</sub> cliques (with node 4 joining one side). The resulting super-graph is small enough that no further merges improve Q → full convergence. Final Q = <strong>${steps[steps.length-1].Q.toFixed(4)}</strong>.</p>`;
  }

  // ── Current step ──
  if (ql.includes('this step') || ql.includes('current step') || ql.includes('what is happening') || ql.includes('what\'s happening') || ql.includes('explain this')) {
    const plainText = s.html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    const comms = s.communities;
    let commList = comms.map((c, i) => {
      const mem = [...c].sort((a,b)=>a-b);
      return `{${mem.join(', ')}}`;
    }).join(', ');
    return `<p><strong>Step ${currentStep+1}: ${s.title}</strong> <em>(${s.badge})</em></p>
      <p>Q = <strong>${s.Q.toFixed(4)}</strong> | Communities: <strong>${comms.length}</strong> — ${commList}</p>
      ${s.highlightNode >= 0 ? `<p>Focus is on <strong>node ${s.highlightNode}</strong> (degree ${degree(s.highlightNode)}).</p>` : ''}
      <p>In the timeline, this is step ${currentStep+1} of ${steps.length}. Use the arrow keys or timeline to navigate.</p>`;
  }

  // ── Community count / list ──
  if (ql.includes('how many communit') || ql.includes('list communit') || ql.includes('what communit') || ql.includes('current communit') || ql.includes('show communit')) {
    const comms = s.communities;
    let list = comms.map((c, i) => {
      const mem = [...c].sort((a,b)=>a-b);
      const lc = internalEdges(mem);
      const dc = sumDegrees(mem);
      return `<strong>C${i}</strong>: {${mem.join(', ')}} — ${lc} internal edges, d_c=${dc}`;
    }).join('<br>');
    return `<p>There are currently <strong>${comms.length} communities</strong>:</p><p>${list}</p>
      <p>Q = <strong>${s.Q.toFixed(4)}</strong></p>`;
  }

  // ── Compare two nodes ──
  if (nodes.length >= 2 || anyNums.length >= 2) {
    const a = nodes.length >= 2 ? nodes[0] : anyNums[0];
    const b = nodes.length >= 2 ? nodes[1] : anyNums[1];
    if (a >= 0 && a < N && b >= 0 && b < N) {
      const commA = communityOfNode(a, assign);
      const commB = communityOfNode(b, assign);
      const sameCom = assign[a] === assign[b];
      const connected = EDGES.some(([x,y]) => (x===a&&y===b)||(x===b&&y===a));
      return `<p><strong>Node ${a}</strong>: degree ${degree(a)}, neighbors {${neighbors(a).join(', ')}}, community {${commA.join(', ')}}<br>
        <strong>Node ${b}</strong>: degree ${degree(b)}, neighbors {${neighbors(b).join(', ')}}, community {${commB.join(', ')}}</p>
        <p>Connected: <strong>${connected ? 'Yes' : 'No'}</strong><br>
        Same community: <strong>${sameCom ? 'Yes' : 'No'}</strong></p>
        ${!sameCom ? `<p>They're in different communities because the internal connections within their respective clusters outweigh the potential gain of merging.</p>` : `<p>They share a community because they have strong mutual connectivity — being together increases internal edge density.</p>`}`;
    }
  }

  // ── How does Louvain work (general) ──
  if (ql.includes('how') && (ql.includes('louvain') || ql.includes('algorithm') || ql.includes('work'))) {
    return `<p>The <strong>Louvain algorithm</strong> finds communities by maximizing modularity in two alternating phases:</p>
      <p><strong>Phase 1</strong>: Start with each node in its own community. For each node, try moving it to each neighbor's community and compute the modularity gain ΔQ. Accept the move with the largest positive ΔQ. Repeat passes until no node moves.</p>
      <p><strong>Phase 2</strong>: Collapse each community into a super-node, creating a smaller weighted graph. Self-loops represent internal edges. Then run Phase 1 again on the smaller graph.</p>
      <p>Repeat until no improvement is possible. It's greedy and fast — O(n log n) in practice — which is why it scales to networks with millions of nodes.</p>`;
  }

  // ── Why 4 communities ──
  if (ql.includes('why') && ql.includes('communit')) {
    const comms = s.communities;
    return `<p>The algorithm finds <strong>${comms.length} communities</strong> because that maximizes modularity for this graph structure.</p>
      <p>Each K<sub>4</sub> clique has <strong>6 internal edges</strong> among 4 nodes, but only <strong>1 bridge edge</strong>. Merging the two cliques would add just 1–2 edges to L_c but dramatically increase d_c (the degree penalty), resulting in a net <strong>decrease</strong> in Q.</p>
      <p>Node 4 (the bridge, degree 2) joins whichever clique offers the best ΔQ — it has 1 edge to each side, so the tie-breaking depends on processing order and current community sizes.</p>`;
  }

  // ── Complexity / performance ──
  if (ql.includes('complex') || ql.includes('fast') || ql.includes('performance') || ql.includes('big o') || ql.includes('scale')) {
    return `<p>Louvain runs in <strong>O(n log n)</strong> time in practice, making it one of the fastest community detection algorithms.</p>
      <p>Phase 1 is O(m) per pass (check each edge), and typically converges in a few passes. Phase 2 shrinks the graph dramatically. The hierarchical coarsening means even networks with <strong>millions of nodes</strong> can be processed in seconds.</p>`;
  }

  // ── Fallback ──
  return `<p>I can answer questions about:</p>
    <p>• <strong>Specific nodes</strong>: "Tell me about node 5", "Why did node 3 join that community?"<br>
    • <strong>The formula</strong>: "Explain the modularity formula", "What is ΔQ?"<br>
    • <strong>Algorithm phases</strong>: "How does Phase 1 work?", "What is aggregation?"<br>
    • <strong>Current step</strong>: "Explain this step", "What's happening?"<br>
    • <strong>Comparisons</strong>: "Compare node 1 and node 4", "What if node 0 moved?"<br>
    • <strong>General</strong>: "Why 4 communities?", "What are bridge edges?"</p>
    <p>Try asking about something specific!</p>`;
}

// ── Suggestion chips ─────────────────────────────────────────
function updateSuggestions() {
  const s = steps[currentStep];
  const suggestions = [];

  if (s.highlightNode >= 0) {
    suggestions.push(`Why did node ${s.highlightNode} move?`);
    suggestions.push(`What if node ${s.highlightNode} went elsewhere?`);
  }
  if (s.badge === 'intro') {
    suggestions.push('How does Louvain work?');
    suggestions.push('Explain the modularity formula');
  }
  if (s.badge === 'phase1') {
    suggestions.push('Explain this step');
    suggestions.push('What is ΔQ?');
  }
  if (s.badge === 'phase2') {
    suggestions.push('What is aggregation?');
    suggestions.push('Why does it converge?');
  }
  if (s.badge === 'result') {
    suggestions.push('Why 4 communities?');
    suggestions.push('What are bridge edges?');
  }
  suggestions.push('How many communities now?');

  const container = document.getElementById('chatSuggestions');
  container.innerHTML = suggestions.map(s =>
    `<button onclick="askSuggestion(this.textContent)">${s}</button>`
  ).join('');
}

function askSuggestion(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addChatMsg('user', text);
  const answer = answerQuestion(text);
  addChatMsg('assistant', answer);
  updateSuggestions();
}

// Resize handle for chat panel
const chatResize = document.getElementById('chatResize');
let resizing = false;
chatResize.addEventListener('mousedown', e => {
  resizing = true;
  e.preventDefault();
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', () => { resizing = false; document.removeEventListener('mousemove', onResize); }, { once: true });
});
function onResize(e) {
  if (!resizing) return;
  const panel = document.getElementById('chatPanel');
  const rect = panel.parentElement.getBoundingClientRect();
  const newH = rect.bottom - e.clientY;
  panel.style.height = Math.max(150, Math.min(newH, rect.height - 100)) + 'px';
}

// Override keyboard nav so it doesn't trigger while typing in chat
document.addEventListener('keydown', e => {
  if (document.activeElement.tagName === 'INPUT') e.stopImmediatePropagation();
}, true);

// Update suggestions when step changes
const origGoStep = goStep;
goStep = function(idx) { origGoStep(idx); if (chatOpen) updateSuggestions(); };
</script>
